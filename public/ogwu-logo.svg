<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep purple to rich violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0032"/>
      <stop offset="100%" stop-color="#6b0080"/>
    </linearGradient>

    <!-- Text gradient: dark purple to violet -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#450050"/>
      <stop offset="100%" stop-color="#7b0090"/>
    </linearGradient>

    <!-- Circle subtle inner gradient -->
    <radialGradient id="circleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3eaf4"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- White circle -->
  <circle cx="256" cy="248" r="178" fill="url(#circleGrad)"/>

  <!-- Small accent dot -->
  <circle cx="256" cy="96" r="14" fill="white" opacity="0.35"/>

  <!-- ogwu wordmark -->
  <text
    x="256"
    y="278"
    font-family="Inter, system-ui, sans-serif"
    font-size="90"
    font-weight="700"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-3"
  >ogwu</text>
</svg>
